<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Three Smiles Login</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#f7d6bd" />
  <style>
    :root { --bg:#fff9f4; --paper:#fffefd; --ink:#2c211b; --muted:#7d6a5f; --line:rgba(84,54,36,.14); --accent:#df7f50; --shadow:0 18px 60px rgba(88,52,30,.12); }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px 18px; font-family: ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--ink); background: radial-gradient(circle at top left, rgba(246,196,83,.22), transparent 34rem), radial-gradient(circle at 85% 10%, rgba(233,155,166,.18), transparent 28rem), var(--bg); }
    .card { width:min(100%,460px); background:rgba(255,254,253,.94); border:1px solid var(--line); border-radius:34px; box-shadow:var(--shadow); padding:clamp(24px,7vw,42px); }
    .logo { width:54px; height:54px; border-radius:18px; background:conic-gradient(from 210deg,#e99ba6,#f6c453,#95b79a,#8bb8d8,#e99ba6); display:grid; place-items:center; margin-bottom:18px; box-shadow:0 10px 30px rgba(192,103,64,.22); }
    .logo svg { width:34px; height:34px; }
    h1 { margin:0 0 10px; font-family:Georgia,"Times New Roman",serif; font-size:clamp(36px,10vw,54px); line-height:.96; letter-spacing:-.045em; font-weight:500; }
    p { color:var(--muted); line-height:1.5; margin:0 0 22px; }
    form { display:grid; gap:14px; }
    label { color:var(--muted); font-size:13px; font-weight:800; }
    select, input { width:100%; border:1px solid var(--line); border-radius:18px; min-height:52px; padding:0 14px; background:rgba(255,255,255,.78); color:var(--ink); margin-top:6px; font:inherit; }
    button { border:0; min-height:52px; border-radius:999px; background:var(--ink); color:#fffaf6; font:inherit; font-weight:850; cursor:pointer; box-shadow:0 14px 30px rgba(44,33,27,.18); }
    .error { min-height:20px; color:#9d2d2d; font-size:13px; margin:0; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo" aria-hidden="true"><svg viewBox="0 0 64 64" fill="none"><path d="M32 55s-2.1-1.7-5.2-4.2C15.6 41.8 8 35.7 8 25.7 8 18.6 13.3 13 20.2 13c4 0 7.9 2 11.8 6 3.9-4 7.8-6 11.8-6C50.7 13 56 18.6 56 25.7c0 10-7.6 16.1-18.8 25.1C34.1 53.3 32 55 32 55Z" fill="#fffaf6"/><circle cx="23" cy="27" r="3" fill="#df7f50"/><circle cx="41" cy="27" r="3" fill="#df7f50"/><path d="M23 36c2.2 2.4 5.1 3.6 9 3.6s6.8-1.2 9-3.6" stroke="#df7f50" stroke-width="4" stroke-linecap="round"/></svg></div>
    <h1>Three Smiles</h1>
    <p>Private sync for Daisy and Charlie. Log in to see the shared history across devices.</p>
    <form id="loginForm">
      <label for="person">Who is checking in?
        <select id="person" autocomplete="username"><option value="Daisy">Daisy</option><option value="Charlie">Charlie</option></select>
      </label>
      <label for="passcode">Passcode
        <input id="passcode" type="password" autocomplete="current-password" required autofocus />
      </label>
      <button type="submit">Unlock Three Smiles</button>
      <p class="error" id="error" role="alert"></p>
    </form>
  </main>
  <script>
    document.querySelector('#loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const error = document.querySelector('#error');
      error.textContent = '';
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ person: document.querySelector('#person').value, passcode: document.querySelector('#passcode').value })
      });
      if (response.ok) window.location.href = '/';
      else { error.textContent = 'That passcode did not work. Try again.'; document.querySelector('#passcode').value = ''; document.querySelector('#passcode').focus(); }
    });
  </script>
</body>
</html>
